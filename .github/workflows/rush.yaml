name: Rush CI Workflow
on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '24.x'
      history-files:
        required: false
        type: string
        default: '+(app|core|ext|library)/*/.allure/history.jsonl'
      history-gist-id:
        required: false
        type: string
        default: ''
      reports-repository:
        required: false
        type: string
        default: ${{ github.repository }}-ci
    secrets:
      CHROMATIC_PROJECT_TOKEN:
        required: false
      BLONG_MASTER_KEY:
        required: false
      REPORT_TOKEN:
        required: false
      HISTORY_TOKEN:
        required: false
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      chromatic: ${{ steps.config.outputs.chromatic }}
      integration: ${{ steps.config.outputs.integration }}
    steps:
      - uses: actions/checkout@v6
      - &node
        name: Use Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
      - &cache
        name: cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            common/temp
            app/**/node_modules
            app/*/dist
            app/*/.rush
            core/**/node_modules
            core/*/dist
            core/*/.rush
            ext/**/node_modules
            ext/*/dist
            ext/*/.rush
            library/**/node_modules
            library/*/dist
            library/*/.rush
          key: ${{ runner.os }}-pnpm-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}
      - name: Rush Install
        run: node common/scripts/install-run-rush.js install
      - name: Rush rebuild
        run: node common/scripts/install-run-rush.js rebuild --verbose
      - name: Config check
        id: config
        run: |
          if [ -z "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "chromatic=" >> $GITHUB_OUTPUT
          else
            echo "chromatic=true" >> $GITHUB_OUTPUT
          fi
          if [ -f ./test/integration/kustomization.yaml ]; then
            echo "integration=true" >> $GITHUB_OUTPUT
          else
            echo "integration=" >> $GITHUB_OUTPUT
          fi
  unit-tests:
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      reports: ${{ steps.result.outputs.reports }}
    steps:
      - uses: actions/checkout@v6
      - *node
      - *cache
      - name: Sync History
        uses: gacts/run-and-post-run@v1
        if: ${{ inputs.history-gist-id != '' }}
        env:
          GH_TOKEN: ${{ secrets.HISTORY_TOKEN }}
        with:
          run: |
            files=$(gh gist view ${{ inputs.history-gist-id }} --files)
            for file in $files; do
              gh gist view ${{ inputs.history-gist-id }} --filename "${file//__//\}" > "$file"
            done
          post: |
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Pull request detected, skipping history sync."
              exit 0
            fi
            shopt -s globstar extglob nullglob
            for file in ${{ inputs.history-files }}; do
              gh gist edit ${{ inputs.history-gist-id }} --filename "${file//\//__}" "$file"
            done
      - run: node common/scripts/install-run-rush.js ci-unit
        name: Run Unit Tests
      - id: check-report
        run: |
          if ls **/coverage/junit.xml 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Publish Test Results
        if: ${{ steps.check-report.outputs.exists == 'true' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/coverage/junit.xml
      - name: check-allure-results
        id: allure-results
        run: |
          shopt -s globstar extglob
          if ls +(app|core|ext|library)/*/allure-report/summary.json 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Run Allure Action
        if: ${{ steps.allure-results.outputs.exists == 'true' }}
        uses: allure-framework/allure-action@v0
        with:
          report-directory: (app|core|ext|library)/*/allure-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: List reports
        id: result
        run: |
          shopt -s globstar extglob nullglob
          REPORTS="["
          for file in +(app|core|ext|library)/*/allure-report; do
            REPORTS="$REPORTS{\"report\":\"${file}\",\"package\":\"$(basename $(dirname $file))\"},"
          done
          REPORTS="${REPORTS%,}]"
          echo "reports=$REPORTS" >> $GITHUB_OUTPUT
      - name: upload reports
        if: ${{ steps.result.outputs.reports != '[]' }}
        uses: actions/upload-artifact@v5
        with:
          name: allure-reports
          path: |
            app/*/allure-report
            core/*/allure-report
            ext/*/allure-report
            library/*/allure-report

  publish-report:
    needs:
      - unit-tests
    if: needs.unit-tests.outputs.reports != '[]'
    # if: needs.unit-tests.outputs.reports != '[]' && github.event_name != 'pull_request'
    strategy:
      matrix:
        include: ${{ fromJson(needs.unit-tests.outputs.reports) }}
      max-parallel: 1
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v5
        with:
          name: allure-reports
      - name: Deploy Reports to GitHub Pages
        uses: PavanMudigonda/html-reporter-github-pages@v1.5.21
        id: deploy
        with:
          token: ${{ secrets.REPORT_TOKEN }}
          subfolder: docs
          test_results: ${{ matrix.report }}
          tool_name: ${{ matrix.package }}
          keep_reports: 15 # Automatically deletes the 16th oldest report
          external_repository: ${{ inputs.reports-repository }}
      - uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ steps.deploy.outputs.latest_result_url }}
        with:
          header: "${{ matrix.package }} report published"
          message: 📊 ${{ matrix.package }} report published at ${{ steps.deploy.outputs.latest_result_url }}
  coverage:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - *node
      - *cache
      - run: node common/scripts/install-run-rush.js ci-coverage
        name: Generate Code Coverage Report
      - id: check-report
        run: |
          if [ -f ./coverage/report.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - uses: ArtiomTr/jest-coverage-report-action@v2
        if: ${{ steps.check-report.outputs.exists == 'true' }}
        id: coverage
        with:
          coverage-file: ./coverage/report.json
          base-coverage-file: ./coverage/report.json
          output: report-markdown
      - uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ steps.coverage.outputs.report }}
        with:
          message: ${{ steps.coverage.outputs.report }}

  chromatic:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.chromatic
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
      CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
      CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
      CHROMATIC_SLUG: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - *node
      - *cache
      - run: node common/scripts/install-run-rush.js ci-chromatic --to git:origin/${{ github.event.pull_request.base.ref }}
        name: Chromatic Storybook
  integration:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.integration
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - *node
      - *cache
      - uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: cluster
          k3d-version: v5.8.3
          args: >-
            -p "3306:30006@agent:0:direct"
            -p "8180:30080@agent:0:direct"
            -p "9092:30092@agent:0:direct"
            -p "27017:30017@agent:0:direct"
            --agents 1
            --no-lb
            --k3s-arg "--disable=traefik,servicelb,metrics-server@server:*"
      - name: Deploy services
        run: kubectl apply -k test/integration/
      - run: node common/scripts/install-run-rush.js ci-integration --to git:origin/${{ github.event.pull_request.base.ref }}
        env:
          BLONG_MASTER_KEY: ${{ secrets.BLONG_MASTER_KEY }}
        name: Run integration checks

  audit:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - *node
      - *cache
      - run: node common/scripts/install-run-rush.js ci-audit
        name: Audit Check for dependencies
      - name: Upload Audit Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: audit-results
          path: '**/audit/auditResults.json'

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - *node
      - *cache
      - run: node common/scripts/install-run-rush.js ci-lint
        name: Lint Check

  deprecation:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - *node
      - *cache
      - run: node common/scripts/install-run-rush.js ci-deprecation
        name: Check for Deprecated dependencies

  ui-tests:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - *node
      - *cache
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - run: node common/scripts/install-run-rush.js ci-ui
        name: Run UI Tests
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  changes:
    runs-on: ubuntu-latest
    # Required permissions
    outputs:
      # Expose matched filters as job 'packages' output variable
      changes: ${{ steps.result.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: List Dockerfiles
        id: docker-files
        run: |
          shopt -s nullglob globstar extglob
          echo -e "filters<<EOF" >> $GITHUB_OUTPUT
          for file in app/**/*Dockerfile; do
            echo "$file: ${file%${file#*/*/}}package.json" >> $GITHUB_OUTPUT
          done
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        id: filter
        if: steps.docker-files.outputs.filters != ''
        name: Filter changes
        with:
          filters: ${{ steps.docker-files.outputs.filters }}
      - name: Convert changes to JSON
        id: result
        if: steps.filter.outputs.changes != ''
        run: |
          PACKAGES="["
          for file in ${{ join(fromJson(steps.filter.outputs.changes), ' ') }}; do
            PACKAGES="$PACKAGES{\"dockerfile\":\"$file\",\"image\":\"$(basename $file | cut -d'.' -f1)\"},"
          done
          PACKAGES="${PACKAGES%,}]"
          echo "changes=$PACKAGES" >> $GITHUB_OUTPUT

  build:
    needs: changes
    if: needs.changes.outputs.changes != ''
    strategy:
      matrix:
        include: ${{ fromJson(needs.changes.outputs.changes) }}
    uses: ./.github/workflows/docker.yaml
    with:
      dockerfile: ${{ matrix.dockerfile }}
      license-scan: false
      downstream: https://api.github.com/repos/infitx-org/profile-cd/actions/workflows/docker-image.yaml/dispatches
